name: Deploy site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Write Supabase config from secrets (optional)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          if [ -n "$SUPABASE_URL" ] && [ -n "$SUPABASE_PUBLISHABLE_KEY" ]; then
            python3 -c "import os; u=os.environ['SUPABASE_URL']; k=os.environ['SUPABASE_PUBLISHABLE_KEY']; open('website/supabase-config.js','w',encoding='utf-8').write('export const supabaseUrl = '+repr(u)+';\nexport const supabasePublishableKey = '+repr(k)+';\n')"
            echo "Wrote website/supabase-config.js"
          else
            echo "No SUPABASE_URL or SUPABASE_PUBLISHABLE_KEY secrets: skipping config (site shows not configured)."
          fi
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
