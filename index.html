<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hello — static starter</title>
    <meta
      name="description"
      content="A minimal static site starter, ready for GitHub Pages."
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;1,9..40,400&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>
    <header class="site-header">
      <p class="eyebrow">Static starter</p>
    </header>
    <main id="main" class="layout">
      <section class="hero" aria-labelledby="hero-title">
        <h1 id="hero-title" class="hero-title">You are live.</h1>
        <p class="lede">
          This is a small static site you can edit locally, version in Git, and
          host with
          <a href="https://pages.github.com/">GitHub Pages</a>
          or any static host.
        </p>
        <ul class="checklist" role="list">
          <li>Edit <code>index.html</code> and <code>styles.css</code></li>
          <li>Commit and push to your repository</li>
        </ul>
      </section>
    </main>
    <footer class="site-footer">
      <p>Built as a starting point — swap this footer for yours.</p>
    </footer>
  </body>
</html>
